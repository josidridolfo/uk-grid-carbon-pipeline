{# components/map_container.html
   Div placeholder for Plotly chart hydration.

   Context variables:
     chart_id      (str, required) — HTML id applied to the chart div; also used to
                                     locate the companion <script type="application/json">
                                     data block.
     height_class  (str, optional) — Tailwind height utility, e.g. "h-[600px]".
                                     Defaults to "h-96" (384px).
     figure_data   (str, optional) — Pre-serialised Plotly figure JSON string.
                                     Defaults to "{}" (empty figure, renders blank chart).
                                     Pass the view's figure_json context value here.

   Usage:
     {% include "components/map_container.html" with
         chart_id="my-chart"
         height_class="h-[500px]"
         figure_data=figure_json %}

   Plotly.js must be loaded before this component — include it in extra_scripts.
#}

<div class="w-full {{ height_class|default:'h-96' }} rounded-xl border border-slate-200 bg-white overflow-hidden"
     id="{{ chart_id }}"
     data-testid="map-container"
     aria-label="Interactive chart: {{ chart_id }}"
     role="img">
</div>

{# Companion JSON data block — populated via figure_data context variable.
   Falls back to "{}" so Plotly.newPlot doesn't crash when no data is provided. #}
<script type="application/json" id="{{ chart_id }}-data">{{ figure_data|default:"{}" }}</script>

<script>
(function () {
  "use strict";
  var dataEl = document.getElementById("{{ chart_id }}-data");
  var chartEl = document.getElementById("{{ chart_id }}");
  if (!dataEl || !chartEl) { return; }
  var figure;
  try {
    figure = JSON.parse(dataEl.textContent);
  } catch (e) {
    console.error("map_container: failed to parse figure JSON for #{{ chart_id }}", e);
    return;
  }
  if (typeof Plotly === "undefined") {
    console.error("map_container: Plotly is not loaded. Include plotly.js before this component.");
    return;
  }
  Plotly.newPlot(
    chartEl,
    figure.data || [],
    figure.layout || {},
    { responsive: true, displaylogo: false }
  );
}());
</script>
