{# components/theme_toggle.html
   Color-scheme selector. Reads and writes localStorage under 'energy-project-theme'.
   Updates <html data-theme="..."> immediately — no page reload required.

   Usage: {% include "components/theme_toggle.html" %}
   Embed inside any <header> element; the component is self-contained and carries
   its own inline <script>.  The flash-prevention script in base.html <head> must
   also be present for a FOUC-free first load.

   No context variables — the component is stateless from Django's perspective.
#}

<div class="relative inline-block" data-testid="theme-toggle">
  <label for="theme-select" class="sr-only">Color theme</label>
  <select
    id="theme-select"
    class="appearance-none rounded border border-[var(--color-border)]
           bg-[var(--color-card-bg)] text-[var(--color-fg)]
           text-xs px-2 py-1 pr-6 cursor-pointer
           focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
    aria-label="Select color theme"
  >
    <option value="default">Light</option>
    <option value="dark">Dark</option>
    <option value="high-contrast">High Contrast</option>
  </select>
  {# Chevron icon — positioned absolutely so the select stays full-width #}
  <span class="pointer-events-none absolute inset-y-0 right-1.5 flex items-center text-[var(--color-muted)]"
        aria-hidden="true">
    &#8964;
  </span>
</div>

<script>
  (function () {
    var select = document.getElementById('theme-select');
    if (!select) return;

    // Initialise the dropdown to the currently active theme
    var current = document.documentElement.getAttribute('data-theme') || 'default';
    select.value = current;

    select.addEventListener('change', function () {
      var theme = this.value;
      document.documentElement.setAttribute('data-theme', theme);
      try {
        localStorage.setItem('energy-project-theme', theme);
      } catch (e) {
        // localStorage blocked (private browsing, storage full) — silent degrade
      }
    });
  })();
</script>
