# =============================================================================
# energy-project.ridol.fo  —  reverse proxy to the Django container
# =============================================================================
# This config is dropped into /etc/nginx/sites-available/ by
# infra/droplet-bootstrap.sh and symlinked into sites-enabled/.
#
# On first run, certbot rewrites this file to add the :443 server block plus
# the SSL directives — do not hand-edit those once certbot has touched it.
# The :80 block below permits both initial certbot validation and the
# permanent HTTP→HTTPS redirect certbot inserts.
# =============================================================================

# Upstream: the Django+Gunicorn container publishes on the loopback only.
# docker-compose binds 127.0.0.1:8000:8000 so this host is the sole ingress.
upstream energy_django {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name energy-project.ridol.fo;

    # Let's Encrypt http-01 challenge — must always be available on :80
    # even after certbot's redirect rewrite. certbot's nginx plugin handles
    # this automatically; this comment is for human readers.

    # Security headers (mirrored on :443 once certbot adds that block).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;  # modern browsers ignore; explicit "off"

    # gzip for text/JSON payloads — Plotly figure JSON benefits significantly.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Static / media served directly by Django+whitenoise in the container;
    # nginx just proxies through. If you later split static to a CDN or
    # serve from host, add `location /static/ { alias ...; }` here.

    client_max_body_size 8M;

    # Health check pass-through — useful for UptimeRobot.
    location = /health {
        proxy_pass http://energy_django/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://energy_django;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # certbot will append the HSTS header to the :443 block it inserts.
    # Until then, no HSTS on :80 (browsers ignore it on plain HTTP anyway).
}
