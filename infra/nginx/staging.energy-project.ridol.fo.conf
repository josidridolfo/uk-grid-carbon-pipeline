# =============================================================================
# staging.energy-project.ridol.fo  —  reverse proxy to the staging Django stack
# =============================================================================
# Identical to the prod site config except for the upstream port (8001 vs 8000)
# and a discreet X-Robots-Tag header that keeps search engines out of staging.
#
# Installed by infra/staging-bootstrap.sh into /etc/nginx/sites-available/ and
# symlinked to sites-enabled/. certbot rewrites this file on first run to add
# the :443 server block + SSL directives + HTTPS redirect — do not hand-edit
# those once certbot has touched it.
# =============================================================================

upstream energy_django_staging {
    server 127.0.0.1:8001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name staging.energy-project.ridol.fo;

    # Keep staging out of Google. Not strictly secret, but visible URLs in
    # search results would confuse anyone googling the prod site.
    add_header X-Robots-Tag "noindex, nofollow" always;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    client_max_body_size 8M;

    location = /health {
        proxy_pass http://energy_django_staging/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://energy_django_staging;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;
    }
}
