version: 2

models:
  - name: stg_neso__dno_polygons
    description: >
      One row per NESO DNO licence area polygon. Source: NESO data portal GeoJSON
      (gb_dno_licence_areas_20240503). View materialisation; no business logic, only
      cleaning and type casts. geometry_wkt is cast to Snowflake GEOGRAPHY via
      TO_GEOGRAPHY() after EPSG:27700→4326 reprojection in the ingestion asset.
    columns:
      - name: geojson_id
        description: NESO GeoJSON feature ID (integer, 10-23).
        tests:
          - not_null
          - unique
      - name: area_name
        description: Area name as published in the NESO GeoJSON source.
        tests:
          - not_null
      - name: dno_code
        description: Abbreviated DNO code.
        tests:
          - not_null
          - accepted_values:
              values: ['UKPN', 'NGED', 'NPG', 'SPEN', 'SSEN', 'ENWL']
      - name: dno_full
        description: Full DNO name as published in the NESO GeoJSON source.
        tests:
          - not_null
      - name: polygon
        description: DNO licence area boundary as a Snowflake GEOGRAPHY (EPSG:4326).
        tests:
          - not_null

  - name: stg_carbon_intensity__national
    description: >
      One row per half-hour interval of national carbon intensity. Source: Carbon
      Intensity API. View materialisation; no business logic, only cleaning and
      type-casting.
    columns:
      - name: interval_start_utc
        description: Start of the half-hour interval (UTC).
        tests:
          - not_null
          - unique
      - name: interval_end_utc
        description: End of the half-hour interval (UTC).
        tests:
          - not_null
      - name: intensity_forecast_gco2_per_kwh
        description: Forecast carbon intensity in gCO2/kWh.
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1000
              severity: warn
      - name: intensity_actual_gco2_per_kwh
        description: Actual settled carbon intensity in gCO2/kWh; null until settled.
      - name: index_band
        description: Categorical band published by the API.
        tests:
          - accepted_values:
              values: ['very low', 'low', 'moderate', 'high', 'very high']
              severity: warn
      - name: fetched_at_utc
        description: Wall-clock UTC time the row was ingested.
        tests:
          - not_null
