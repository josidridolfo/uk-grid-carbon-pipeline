version: 2

sources:
  - name: raw_carbon_intensity
    description: >
      Raw rows landed by the Dagster Carbon Intensity API ingestion assets.
      One row per half-hour interval, per region (national or DNO area).
    database: UK_GRID
    schema: raw
    loader: dagster
    tables:
      - name: raw_carbon_intensity__national
        description: National (GB-wide) half-hourly carbon intensity, actual + forecast.
        loaded_at_field: _fetched_at_utc
        freshness:
          warn_after: { count: 2, period: hour }
          error_after: { count: 12, period: hour }
        columns:
          - name: interval_start_utc
            description: Start of the half-hour interval (UTC).
            tests:
              - not_null
          - name: interval_end_utc
            description: End of the half-hour interval (UTC).
            tests:
              - not_null
          - name: intensity_forecast_gco2_per_kwh
            description: Forecast carbon intensity in gCO2/kWh.
          - name: intensity_actual_gco2_per_kwh
            description: Actual settled carbon intensity in gCO2/kWh (null until settled).
          - name: index_band
            description: Categorical band (very low / low / moderate / high / very high).
          - name: _fetched_at_utc
            description: Wall-clock time the row was ingested.
            tests:
              - not_null

      - name: raw_carbon_intensity__regional
        description: >
          Per-region half-hourly carbon intensity for the 18 Carbon Intensity API
          regions (14 DNO licence areas + 3 nation aggregates + GB-total).
          Grain: (interval, region). Forecast-only (no `actual` — that's a known
          API limitation for the regional endpoint).
        loaded_at_field: _fetched_at_utc
        freshness:
          warn_after: { count: 2, period: hour }
          error_after: { count: 12, period: hour }
        columns:
          - name: interval_start_utc
            description: Start of the half-hour interval (UTC).
            tests:
              - not_null
          - name: interval_end_utc
            description: End of the half-hour interval (UTC).
            tests:
              - not_null
          - name: region_id
            description: API regionid (1-14 DNO areas, 15-17 nation aggregates, 18 GB total).
            tests:
              - not_null
          - name: region_shortname
            description: Short region label as published by the API (e.g. "North Scotland", "GB").
            tests:
              - not_null
          - name: region_dnoregion
            description: Pre-2021 DNO company name from the API (e.g. "WPD South Wales"). The current name is in dim_dno_region.dno_full_current.
          - name: intensity_forecast_gco2_per_kwh
            description: Forecast carbon intensity in gCO2/kWh (model-derived).
          - name: intensity_actual_gco2_per_kwh
            description: Always NULL for the regional endpoint; column exists for schema parity with the national source.
          - name: index_band
            description: Categorical band (very low / low / moderate / high / very high).
          - name: _fetched_at_utc
            description: Wall-clock time the row was ingested.
            tests:
              - not_null

  - name: raw_neso
    description: >
      Static reference data landed by Dagster NESO geo ingestion assets.
      Polygons are reprojected from EPSG:27700 (British National Grid) to
      EPSG:4326 (WGS84) during ingestion so Snowflake GEOGRAPHY can consume them.
    database: UK_GRID
    schema: raw
    loader: dagster
    tables:
      - name: raw_neso__dno_polygons
        description: >
          One row per GB DNO licence area (14 features). Geometry stored as WKT
          in EPSG:4326; cast to GEOGRAPHY in the staging model.
        columns:
          - name: geojson_id
            description: Numeric ID from the NESO GeoJSON (10-23).
            tests:
              - not_null
              - unique
          - name: area_name
            description: Region name from the GeoJSON Area property.
            tests:
              - not_null
          - name: dno_code
            description: Short DNO code from the GeoJSON DNO property.
            tests:
              - not_null
          - name: dno_full
            description: Full DNO company name from the GeoJSON DNO_Full property.
            tests:
              - not_null
          - name: geometry_wkt
            description: Polygon geometry as WKT in EPSG:4326 (WGS84).
            tests:
              - not_null

  - name: raw_grid_eso
    description: National Grid ESO open data — generation mix, demand, prices. STUB.
    database: UK_GRID
    schema: raw
    tables: []

  - name: raw_met_office
    description: Met Office DataPoint weather observations and forecasts. STUB.
    database: UK_GRID
    schema: raw
    tables: []
