name: Deploy

# Two-stage pipeline: every push to main deploys to staging FIRST. If staging
# is healthy (all routes return 200), the prod job runs. The `production`
# GitHub Environment can be configured (Settings → Environments → production)
# with "Required reviewers" to add a manual approval gate before prod deploys.
# Today there's no gate — staging-success auto-promotes to prod.
#
# Both stacks run on the same droplet. Staging uses COMPOSE_PROJECT_NAME
# `energy-staging` to isolate containers/volumes/network from prod.
#
# Smoke checks: each environment is curl'd on / + /blog/ + /intensity/national/
# AFTER /health returns 200. A template bug that takes down every page would
# fail the staging job → prod never gets the broken build.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # STAGING
  # ==========================================================================
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.energy-project.ridol.fo

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add droplet host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy staging stack
        env:
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          GIT_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=yes \
              "$DROPLET_USER@$DROPLET_HOST" \
              "GIT_SHA=$GIT_SHA bash -s" <<'REMOTE_EOF'
            set -euo pipefail
            cd /opt/energy-project

            echo "==> [1/6] Fetching latest main"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "==> [2/6] Stamping GIT_SHA into web/.env.staging"
            if [ ! -f web/.env.staging ]; then
              echo "ERROR: web/.env.staging not found on droplet." >&2
              echo "Run: sudo bash infra/staging-bootstrap.sh + populate the file." >&2
              exit 1
            fi
            grep -q '^GIT_SHA=' web/.env.staging \
              && sed -i "s|^GIT_SHA=.*|GIT_SHA=${GIT_SHA}|" web/.env.staging \
              || echo "GIT_SHA=${GIT_SHA}" >> web/.env.staging

            echo "==> [3/6] Building + restarting STAGING stack"
            cd web
            COMPOSE_PROJECT_NAME=energy-staging \
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.staging.yml \
                up -d --build --remove-orphans

            echo "==> [4/6] Migrations on staging DB"
            COMPOSE_PROJECT_NAME=energy-staging \
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.staging.yml \
                exec -T web python manage.py migrate --noinput

            echo "==> [5/6] Wait for staging container health"
            healthy=false
            for i in {1..15}; do
              if curl -fsS http://127.0.0.1:8001/health >/dev/null 2>&1; then
                healthy=true; break
              fi
              sleep 2
            done
            if [ "$healthy" != "true" ]; then
              echo "ERROR: staging container did not respond on /health within 30s" >&2
              COMPOSE_PROJECT_NAME=energy-staging \
                docker compose -f docker-compose.yml -f docker-compose.staging.yml logs web --tail=80 >&2
              exit 1
            fi

            echo "==> [6/6] Smoke-check staging routes"
            FAILED=0
            for path in "/" "/blog/" "/intensity/national/"; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "https://staging.energy-project.ridol.fo$path")
              echo "  staging $path → $code"
              if [ "$code" != "200" ]; then
                echo "::error::staging smoke check failed: $path returned $code" >&2
                FAILED=1
              fi
            done
            if [ "$FAILED" != "0" ]; then
              COMPOSE_PROJECT_NAME=energy-staging \
                docker compose -f docker-compose.yml -f docker-compose.staging.yml logs web --tail=80 >&2
              exit 1
            fi
            echo "✓ Staging healthy: ${GIT_SHA:0:7}"
          REMOTE_EOF

      - name: Annotate staging failure
        if: failure()
        run: |
          echo "::error::Staging deploy failed for ${{ github.sha }}. Prod will NOT auto-deploy until staging is green."

  # ==========================================================================
  # PRODUCTION  (runs only if staging passed)
  # ==========================================================================
  deploy-prod:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      # Configure required reviewers on this environment in
      # Settings → Environments → production to add a manual approval gate.
      # Without that rule, prod auto-promotes from staging-success.
      name: production
      url: https://energy-project.ridol.fo

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add droplet host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy prod stack
        env:
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          GIT_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=yes \
              "$DROPLET_USER@$DROPLET_HOST" \
              "GIT_SHA=$GIT_SHA bash -s" <<'REMOTE_EOF'
            set -euo pipefail
            cd /opt/energy-project

            echo "==> [1/6] Fetching latest main"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "==> [2/6] Stamping GIT_SHA into web/.env"
            grep -q '^GIT_SHA=' web/.env \
              && sed -i "s|^GIT_SHA=.*|GIT_SHA=${GIT_SHA}|" web/.env \
              || echo "GIT_SHA=${GIT_SHA}" >> web/.env

            echo "==> [3/6] Building + restarting PROD stack"
            cd web
            docker compose pull || true
            docker compose up -d --build --remove-orphans

            echo "==> [4/6] Migrations on prod DB"
            docker compose exec -T web python manage.py migrate --noinput

            echo "==> [5/6] Wait for prod container health"
            healthy=false
            for i in {1..15}; do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
                healthy=true; break
              fi
              sleep 2
            done
            if [ "$healthy" != "true" ]; then
              echo "ERROR: prod container did not respond on /health within 30s" >&2
              docker compose logs web --tail=80 >&2
              exit 1
            fi

            echo "==> [6/6] Smoke-check prod routes"
            FAILED=0
            for path in "/" "/blog/" "/intensity/national/"; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "https://energy-project.ridol.fo$path")
              echo "  prod $path → $code"
              if [ "$code" != "200" ]; then
                echo "::error::prod smoke check failed: $path returned $code" >&2
                FAILED=1
              fi
            done
            if [ "$FAILED" != "0" ]; then
              docker compose logs web --tail=80 >&2
              exit 1
            fi
            echo "✓ Prod healthy across all routes: ${GIT_SHA:0:7}"
          REMOTE_EOF

      - name: Annotate prod failure
        if: failure()
        run: |
          echo "::error::Prod deploy failed for ${{ github.sha }}. Staging was healthy at this commit; investigate divergence."
          echo "::error::SSH and run: cd /opt/energy-project/web && docker compose logs web --tail=100"
