name: Deploy to droplet

# Trigger: on every push to main (which happens when a PR is squash-merged).
# Gated on the CI workflow having passed for the same commit — if `ci.yml`
# fails, this job won't run thanks to the `needs:` reference and the
# `workflow_run` event would be the alternative if we wanted cross-workflow
# gating. For simplicity here we use a single workflow with sequenced jobs:
# the `wait-for-ci` job uses `gh run watch` to block until the CI workflow
# completes successfully.

on:
  push:
    branches: [main]
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI (useful for
    # re-deploying after a hotfix that didn't change code, e.g. .env on
    # the droplet was updated and you want to force a restart).

concurrency:
  # Only one deploy at a time per branch; queue subsequent merges.
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    # The `environment: production` reference means GitHub will surface this
    # job in the Environments tab and (optionally, if you configure it in
    # repo settings) require manual approval before the job runs. Today
    # we leave approval off — every merge auto-deploys. To turn on a
    # human-in-the-loop gate, add a "Required reviewers" rule on the
    # `production` environment in repo Settings → Environments.

    steps:
      - name: Set up SSH
        # Loads the deploy key from secrets into a temporary agent.
        # The key is restricted on the droplet via authorized_keys options
        # (no PTY, command="cd /opt/energy-project && ..."). See deployment
        # docs in `infra/README.md`.
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add droplet host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          GIT_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=yes \
              "$DROPLET_USER@$DROPLET_HOST" \
              "GIT_SHA=$GIT_SHA bash -s" <<'REMOTE_EOF'
            set -euo pipefail

            cd /opt/energy-project

            echo "==> [1/5] Fetching latest main"
            git fetch origin main
            git checkout main
            git reset --hard origin/main   # discard local changes (e.g. cached pyc files); droplet is a deploy target, not a dev env

            echo "==> [2/5] Recording deployed SHA for /health endpoint"
            # The Django health view reads GIT_SHA from env; we surface
            # which commit is live so a curl /health tells you what's running.
            grep -q '^GIT_SHA=' web/.env && \
              sed -i "s|^GIT_SHA=.*|GIT_SHA=${GIT_SHA}|" web/.env || \
              echo "GIT_SHA=${GIT_SHA}" >> web/.env

            echo "==> [3/5] Building + restarting the stack"
            cd web
            docker compose pull || true   # pull base images if updated; tolerate offline
            docker compose up -d --build --remove-orphans

            echo "==> [4/5] Running Django migrations (idempotent)"
            docker compose exec -T web python manage.py migrate --noinput

            echo "==> [5/6] Wait for container health"
            # Wait up to 30s for /health to come up — that's the minimum signal
            # that Django booted, DB is connected, and Gunicorn workers are ready.
            healthy=false
            for i in {1..15}; do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
                healthy=true
                break
              fi
              sleep 2
            done

            if [ "$healthy" != "true" ]; then
              echo "ERROR: container did not respond on /health within 30s" >&2
              docker compose logs web --tail=80 >&2
              exit 1
            fi

            echo "==> [6/6] Smoke-check every public route"
            # /health is necessary but not sufficient — a JSON view bypasses
            # templates entirely. Validate that template-rendering routes also
            # return 200 (catches template bugs, missing deps, broken cotton
            # components, etc. that don't affect the JSON health view).
            FAILED=0
            for path in "/" "/blog/" "/intensity/national/"; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "https://energy-project.ridol.fo$path")
              echo "  $path → $code"
              if [ "$code" != "200" ]; then
                echo "::error::Smoke check failed: $path returned $code" >&2
                FAILED=1
              fi
            done

            if [ "$FAILED" != "0" ]; then
              echo "ERROR: one or more routes returned non-200 — check the listing above" >&2
              docker compose logs web --tail=80 >&2
              exit 1
            fi

            echo "✓ Deploy healthy across all routes: ${GIT_SHA:0:7}"
          REMOTE_EOF

      - name: Notify failure
        # On failure, surface the deploy logs in the GitHub Actions UI.
        # The job's exit status is the source of truth — this step just
        # adds a human-readable message at the top.
        if: failure()
        run: |
          echo "::error::Deploy to energy-project.ridol.fo failed for commit ${{ github.sha }}."
          echo "::error::SSH into the droplet and run \`cd /opt/energy-project/web && docker compose logs web --tail=100\` to investigate."
